<div class="member-edit-modern">
    <mat-card class="edit-card">
        <div class="edit-header">
            <div>
                <h2>Edit Member</h2>
                <div class="member-id">ID: {{ memberId }}</div>
            </div>
            <div class="status-chip" [ngClass]="member.active ? 'active' : 'inactive'">
                <mat-icon>{{ member.active ? 'check_circle' : 'cancel' }}</mat-icon>
                {{ member.active ? 'Active' : 'Inactive' }}
            </div>
        </div>
        <div class="note">Fields with <span class="red-color">*</span> are required.</div>
        <form *ngIf="memberForm" [formGroup]="memberForm" (ngSubmit)="onSubmit()" class="edit-form">
            <div class="form-row">
                <mat-form-field appearance="outline" class="w-full">
                    <mat-label>First Name <span class="red-color">*</span></mat-label>
                    <input matInput formControlName="firstName" />
                </mat-form-field>
                <mat-form-field appearance="outline" class="w-full">
                    <mat-label>Middle Name</mat-label>
                    <input matInput formControlName="middleName" />
                </mat-form-field>
            </div>
            <div class="form-row">
                <mat-form-field appearance="outline" class="w-full">
                    <mat-label>Last Name <span class="red-color">*</span></mat-label>
                    <input matInput formControlName="lastName" />
                </mat-form-field>
                <mat-form-field appearance="outline" class="w-full">
                    <mat-label>Email <span class="red-color">*</span></mat-label>
                    <input matInput type="email" formControlName="email" />
                </mat-form-field>
            </div>
            <div class="form-row">
                <mat-form-field appearance="outline" class="w-full">
                    <mat-label>Phone Number <span class="red-color">*</span></mat-label>
                    <input matInput formControlName="phoneNumber" />
                </mat-form-field>
                <mat-form-field appearance="outline" class="w-full">
                    <mat-label>Gender <span class="red-color">*</span></mat-label>
                    <mat-select formControlName="gender">
                        <mat-option value="MALE">Male</mat-option>
                        <mat-option value="FEMALE">Female</mat-option>
                    </mat-select>
                </mat-form-field>
            </div>
            <div class="form-row status-toggle-row">
                <mat-slide-toggle [checked]="member.active" (change)="onToggleStatus()" color="primary">
                    {{ member.active ? 'Active' : 'Inactive' }}
                </mat-slide-toggle>
            </div>
            <div class="button-group">
                <button mat-raised-button color="primary" type="submit" [disabled]="memberForm.invalid">
                    <mat-icon>save</mat-icon>
                    Save Changes
                </button>
                <button mat-stroked-button color="warn" type="button" (click)="onCancel()">
                    <mat-icon>close</mat-icon>
                    Cancel
                </button>
            </div>
        </form>
    </mat-card>
</div>
