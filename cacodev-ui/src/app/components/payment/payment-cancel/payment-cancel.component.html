<div class="payment-result-container">
  <mat-card class="result-card cancel">
    <mat-card-content class="result-content">
      <div class="icon-wrapper cancel">
        <mat-icon>cancel</mat-icon>
      </div>
      <h2>Payment Cancelled</h2>
      <p class="message">Your payment was cancelled. No charges were made to your account.</p>
      <div class="actions">
        <button mat-stroked-button routerLink="/donate">
          Try Again
        </button>
        <button mat-raised-button color="primary" routerLink="/">
          Return to Home
        </button>
      </div>
    </mat-card-content>
  </mat-card>
</div>
