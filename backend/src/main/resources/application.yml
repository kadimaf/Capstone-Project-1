spring:
  application:
    name: CACODEV API
    version: 1.0.0
  profiles:
    active: local

  datasource:
    username: CacodevAppUser
    password: Password123$
    url: jdbc:sqlserver://localhost:1433;encrypt=true;trustServerCertificate=true
    dbName: CacodevDB
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver

  jpa:
    generate-ddl: true
    open-in-view: false
    hibernate:
      ddl-auto: update

springdoc:
  swagger-ui:
    enabled: true
    tags-sorter: alpha
    operations-sorter: alpha
    default-model-expand-depth: 0
  api-docs:
    enabled: true

server:
  port: 8080
  shutdown: graceful
  servlet:
    context-path: /cacodev

logging:
  level:
    root: info
    org.springframework.web: info

# Stripe Configuration
# IMPORTANT: Set these environment variables before running:
# - STRIPE_SECRET_KEY: Your Stripe secret key (sk_test_... or sk_live_...)
# - STRIPE_WEBHOOK_SECRET: Your Stripe webhook signing secret (whsec_...)
stripe:
  api-key: ${STRIPE_SECRET_KEY:your_stripe_key_here}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET:whsec_placeholder}
  success-url: http://localhost:4200/payment/success?session_id={CHECKOUT_SESSION_ID}
  cancel-url: http://localhost:4200/payment/cancel

